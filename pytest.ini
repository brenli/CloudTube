[pytest]
# Pytest configuration for youtube-webdav-bot

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    property: Property-based tests
    integration: Integration tests
    slow: Slow running tests

# Coverage options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=bot
    --cov-report=html
    --cov-report=term-missing

# Test paths
testpaths = tests

# Hypothesis settings
hypothesis_profile = default

[coverage:run]
source = bot
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
